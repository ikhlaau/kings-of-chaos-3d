services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: koc3d
      POSTGRES_USER: koc3d
      POSTGRES_PASSWORD: ${DB_PASSWORD:-koc3d_prod}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U koc3d"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://koc3d:${DB_PASSWORD:-koc3d_prod}@db:5432/koc3d
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: "false"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}

volumes:
  pgdata:
