name: Build and Push Docker Image

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ikhlaau --password-stdin
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        run: |
          docker build -t ghcr.io/ikhlaau/kings-of-chaos-3d:latest .
          docker push ghcr.io/ikhlaau/kings-of-chaos-3d:latest
