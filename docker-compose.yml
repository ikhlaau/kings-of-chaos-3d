services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: koc3d
      POSTGRES_USER: koc3d
      POSTGRES_PASSWORD: koc3d_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://koc3d:koc3d_dev@db:5432/koc3d
      DJANGO_SECRET_KEY: dev-secret-key-change-in-production
      DJANGO_DEBUG: "true"

volumes:
  pgdata:
