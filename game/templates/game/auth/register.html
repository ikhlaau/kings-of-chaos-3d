<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kings of Chaos 3D — Register</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a12; color: #e0e0e0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; min-height: 100dvh; padding: 16px;
        }
        .card {
            background: #1a1a2e; border: 1px solid #2a2a4a;
            border-radius: 12px; padding: clamp(20px, 5vw, 40px);
            width: min(380px, 100%); max-width: 100%;
        }
        h1 { text-align: center; margin-bottom: 24px; color: #c9a050; font-size: clamp(18px, 5vw, 24px); }
        form { display: flex; flex-direction: column; gap: 12px; }
        form p { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 14px; color: #aaa; }
        input {
            padding: 12px; border-radius: 6px; border: 1px solid #3a3a5a;
            background: #12122a; color: #e0e0e0; font-size: 16px; width: 100%;
        }
        input:focus { outline: none; border-color: #c9a050; }
        button {
            padding: 14px; border: none; border-radius: 6px;
            background: #c9a050; color: #0a0a12; font-size: 16px;
            font-weight: bold; cursor: pointer; margin-top: 8px;
            -webkit-appearance: none;
        }
        button:hover { background: #d4af6a; }
        .link { text-align: center; margin-top: 16px; font-size: 14px; }
        .link a { color: #c9a050; text-decoration: none; }
        .errorlist { list-style: none; padding: 0; }
        .errorlist li { color: #e05555; font-size: 13px; }
        .helptext { font-size: 12px; color: #888; }
        @media (max-width: 400px) {
            .card { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>⚔️ Join the Kingdom</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Create Account</button>
        </form>
        <p class="link">Already have an account? <a href="{% url 'login' %}">Log in</a></p>
    </div>
</body>
</html>
