<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kings of Chaos 3D — Register</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a12;
            color: #e0e0e0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 40px;
            width: 380px;
            max-width: 90vw;
        }
        h1 { text-align: center; margin-bottom: 24px; color: #c9a050; font-size: 24px; }
        form { display: flex; flex-direction: column; gap: 16px; }
        input {
            padding: 12px; border-radius: 6px; border: 1px solid #3a3a5a;
            background: #12122a; color: #e0e0e0; font-size: 14px;
        }
        input:focus { outline: none; border-color: #c9a050; }
        button {
            padding: 12px; border: none; border-radius: 6px;
            background: #c9a050; color: #0a0a12; font-size: 16px;
            font-weight: bold; cursor: pointer; margin-top: 8px;
        }
        button:hover { background: #d4af6a; }
        .link { text-align: center; margin-top: 16px; font-size: 14px; }
        .link a { color: #c9a050; text-decoration: none; }
        .error { color: #e05555; font-size: 13px; list-style: none; }
        .errorlist { list-style: none; padding: 0; }
        .errorlist li { color: #e05555; font-size: 13px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>⚔️ Join the Kingdom</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Create Account</button>
        </form>
        <p class="link">Already have an account? <a href="{% url 'login' %}">Log in</a></p>
    </div>
</body>
</html>
